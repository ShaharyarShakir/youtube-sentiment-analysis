services:

  # ── Garage (S3-compatible object store) ──────────────────────────────
  garage:
    image: dxflrs/garage:v2.3.0
    container_name: garage
    ports:
      - "3900:3900"
      - "3901:3901"
      - "3902:3902"
      - "3903:3903"
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage-meta:/var/lib/garage/meta
      - garage-data:/var/lib/garage/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/garage", "-c", "/etc/garage.toml", "status"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 40s

  # ── One-shot bootstrap ────────────────────────────────────────────────
  garage-init:
    image: alpine:3.19
    container_name: garage-init
    depends_on:
      garage:
        condition: service_healthy
    network_mode: "service:garage"
    volumes:
      - garage-meta:/var/lib/garage/meta
      - ./garage-bin:/garage-bin/garage:ro
      - ./init-garage.sh:/init-garage.sh:ro
    environment:
      GARAGE_ACCESS_KEY: ${GARAGE_ACCESS_KEY}
      GARAGE_SECRET_KEY: ${GARAGE_SECRET_KEY}
      GARAGE_BUCKET: ${GARAGE_BUCKET}
      GARAGE_RPC_SECRET: ${GARAGE_RPC_SECRET}
      GARAGE_ADMIN_TOKEN: ${GARAGE_ADMIN_TOKEN}
    restart: "no"
    entrypoint: ["/bin/sh", "/init-garage.sh"]

  # ── Garage Web UI ─────────────────────────────────────────────────────
  webui:
    image: khairul169/garage-webui:latest
    container_name: garage-webui
    restart: unless-stopped
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
    ports:
      - "3909:3909"
    environment:
      API_BASE_URL: "http://garage:3903"
      S3_ENDPOINT_URL: "http://garage:3900"

  # ── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mlflow-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # ── MLflow ────────────────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: mlflow
    depends_on:
      postgres:
        condition: service_healthy
      garage-init:
        condition: service_completed_successfully
    ports:
      - "${MLFLOW_PORT:-5000}:5000"
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://garage:3900
      AWS_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_SECRET_KEY}
      AWS_DEFAULT_REGION: ${GARAGE_REGION}
      MLFLOW_FLASK_SERVER_SECRET_KEY: "supersecretkey"
      MLFLOW_DEPLOYMENTS_TARGET: "http://mlflow:5000"
    command: >
      mlflow server
        --backend-store-uri postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
        --default-artifact-root s3://${GARAGE_BUCKET}/
        --host 0.0.0.0
        --port 5000
        --allowed-hosts "*"
    restart: unless-stopped

  # ── FastAPI ───────────────────────────────────────────────────────────
  fastapi:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: fastapi
    ports:
      - "8000:8000"
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://garage:3900
      AWS_ACCESS_KEY_ID: ${GARAGE_ACCESS_KEY}
      AWS_SECRET_ACCESS_KEY: ${GARAGE_SECRET_KEY}
      AWS_DEFAULT_REGION: ${GARAGE_REGION}
    depends_on:
      - mlflow
    restart: unless-stopped

  # ── Prometheus ────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.2
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    restart: unless-stopped

  # ── Loki ──────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.7
    container_name: loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki-config.yml:/etc/loki/config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/config.yml
    restart: unless-stopped

  # ── Promtail ──────────────────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.7
    container_name: promtail
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    restart: unless-stopped
    depends_on:
      - loki

  # ── Grafana ───────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.2
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki

volumes:
  garage-meta:
  garage-data:
  postgres-data:
  prometheus-data:
  loki-data:
  grafana-data: